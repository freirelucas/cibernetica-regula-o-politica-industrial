name: testes

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar pytest
        run: pip install pytest
      - name: Rodar a suite
        run: pytest -q
