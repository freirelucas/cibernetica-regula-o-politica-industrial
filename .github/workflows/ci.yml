name: testes

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar pytest
        run: pip install pytest
      - name: Regenerar derivados volumosos do cache (offline, sem rede)
        # PR-3: data/author_network.json é gitignored (>1 MB, regenerável). O cache
        # versionado o reconstrói em ~20s sem tocar a rede (OA_OFFLINE). PR-8 troca
        # este passo pelo smoke completo run_all.py --offline.
        run: OA_OFFLINE=1 python src/author_network.py
      - name: Rodar a suite
        run: pytest -q
